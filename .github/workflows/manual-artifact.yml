name: manual-artifact

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6          # v4 -> v6（支持 Node.js 24）

      - name: Setup Java
        uses: actions/setup-java@v5        # v4 -> v5（支持 Node.js 24）
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4   # 保持 v4，其最新补丁已支持 Node.js 24
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Gradle build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v7   # 已支持 Node.js 24，无需变动
        with:
          name: voxy-artifacts
          path: build/libs/*.jar
          archive: false
